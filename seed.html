<!DOCTYPE html>
<html lang="en">

<head>
  <script>
    (function () {
      const savedTheme = localStorage.getItem('siteTheme') || 'minimal';
      if (savedTheme !== 'default') {
        document.documentElement.setAttribute('data-theme', savedTheme);
      }
      const themeColors = {
        'default': '#B45309',
        'green': '#047857',
        'blue': '#1E40AF',
        'golden': '#AA8A2E',
        'black': '#0A0A0A',
        'frost': '#E0F2FE',
        'minimal': '#000000'
      };
      document.write('<meta name="theme-color" content="' + (themeColors[savedTheme] || '#B45309') + '">');
    })();
  </script>
  
    <meta charset="UTF-8">
    <title>Seed Courses</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 2rem;
            background: #1E293B;
            color: #F8FAFC;
        }

        #log p {
            margin: 0.5rem 0;
            font-family: monospace;
            color: #4ADE80;
        }
    </style>
</head>

<body>
    <h2>Seeding Data to Firestore...</h2>
    <div id="log"></div>
    <script type="module" src="./seed.ts"></script>
</body>

</html>
