<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - JKSSB Drivers Academy</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .success-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-app);
            padding: 20px;
        }
        .success-card {
            background: white;
            border-radius: 32px;
            padding: 48px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .check-icon {
            width: 80px;
            height: 80px;
            background: #10B981;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 24px;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
        p { color: var(--text-secondary); margin-bottom: 32px; line-height: 1.6; }
        .receipt-box {
            background: #F8FAFC;
            border: 1px dashed #CBD5E1;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 32px;
            text-align: left;
        }
        .receipt-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .receipt-label { color: var(--text-tertiary); }
        .receipt-value { font-weight: 600; color: var(--text-primary); }
        .actions { display: grid; gap: 12px; }
        
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="success-page">
        <div class="success-card" id="status-container">
            <div class="check-icon"><i class="fa-solid fa-spinner fa-spin"></i></div>
            <h1>Verifying Payment...</h1>
            <p>Please wait while we confirm your enrollment with Cashfree.</p>
        </div>
    </div>
    <script type="module" src="payment-success.ts"></script>
</body>
</html>
