<!DOCTYPE html>
<html lang="en">

<head>
  <script>
    (function () {
      const savedTheme = localStorage.getItem('siteTheme') || 'minimal';
      if (savedTheme !== 'default') {
        document.documentElement.setAttribute('data-theme', savedTheme);
      }
      const themeColors = {
        'default': '#B45309',
        'green': '#047857',
        'blue': '#1E40AF',
        'golden': '#AA8A2E',
        'black': '#0A0A0A',
        'frost': '#E0F2FE',
        'minimal': '#000000'
      };
      document.write('<meta name="theme-color" content="' + (themeColors[savedTheme] || '#B45309') + '">');
    })();
  </script>
  
    <meta charset="UTF-8">
    <title>Payment Successful</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f0fdf4;
            color: #16a34a;
        }

        .spinner {
            margin-top: 20px;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(22, 163, 74, 0.3);
            border-radius: 50%;
            border-top-color: #16a34a;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
        <polyline points="22 4 12 14.01 9 11.01"></polyline>
    </svg>
    <h2 style="margin-top: 16px;">Payment Successful!</h2>
    <p style="color: #15803d;">Verifying your enrollment...</p>
    <div class="spinner"></div>

    <script>
        // Redirection logic. We are in a native new tab now, not an iframe.
        // Wait 2.5 seconds to show the user it was successful then route to dashboard
        setTimeout(() => {
            const urlParams = new URLSearchParams(window.location.search);
            const courseId = urlParams.get('course_id');
            if (courseId) {
                window.location.href = `./my-courses.html?courseId=${courseId}`;
            } else {
                window.location.href = './my-courses.html';
            }
        }, 2500);
    </script>
</body>

</html>
