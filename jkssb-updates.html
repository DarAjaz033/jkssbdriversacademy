<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      const savedTheme = localStorage.getItem('siteTheme') || 'minimal';
      if (savedTheme !== 'default') {
        document.documentElement.setAttribute('data-theme', savedTheme);
      }
      const themeColors = {
        'default': '#B45309',
        'green': '#047857',
        'blue': '#1E40AF',
        'golden': '#AA8A2E',
        'black': '#0A0A0A',
        'frost': '#E0F2FE',
        'minimal': '#000000'
      };
      const color = themeColors[savedTheme] || '#B45309';
      document.write('<meta name="theme-color" content="' + color + '">');
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Latest Updates - JKSSB Drivers Academy</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Rajdhani:wght@500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="./styles.css">
  <style>
    body {
      background: var(--bg-page);
      font-family: 'Poppins', sans-serif;
    }

    .updates-container {
      max-width: 600px;
      margin: 0 auto;
      padding-bottom: 50px;
    }

    /* Tab Bar */
    .tab-bar-container {
      position: sticky;
      top: 60px;
      background: var(--bg-page);
      padding: 10px 16px;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .tab-bar {
      background: rgba(0, 0, 0, 0.05);
      border-radius: 12px;
      display: flex;
      padding: 4px;
      gap: 4px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 700;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tab-btn.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 12px rgba(180, 83, 9, 0.2);
    }

    /* Update Cards */
    .updates-list {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .update-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
      animation: fadeInUp 0.4s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .update-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .update-icon {
      font-size: 22px;
    }

    .update-title {
      flex: 1;
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
    }

    .tag-badge {
      font-size: 10px;
      font-weight: 800;
      padding: 3px 8px;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .update-desc {
      font-family: 'Rajdhani', sans-serif;
      font-size: 13.5px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin: 0;
    }

    .update-footer {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }

    .update-date {
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      color: var(--text-tertiary);
    }

    /* Official AI News Cards */
    .news-card {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .news-card:active {
      transform: scale(0.98);
    }

    .news-source-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .news-source {
      background: rgba(180, 83, 9, 0.1);
      color: var(--primary);
      font-size: 10px;
      font-weight: 800;
      padding: 3px 8px;
      border-radius: 6px;
    }

    .news-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .read-more-link {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--primary);
      font-size: 12px;
      font-weight: 800;
      margin-top: 8px;
    }

    .hidden { display: none; }

    #news-loading {
      text-align: center;
      padding: 40px;
      color: var(--text-tertiary);
    }
  </style>
</head>
<body>
  <div id="app">
    <header class="app-bar">
      <div class="app-bar-content">
        <button class="icon-btn" onclick="window.history.back()">
          <i data-lucide="arrow-left" width="24" height="24"></i>
        </button>
        <div class="app-bar-title">
          <span>Latest Updates</span>
        </div>
        <div style="width: 40px;"></div>
      </div>
    </header>

    <main class="page-container">
      <div class="updates-container">
        <!-- Sticky Tab Bar -->
        <div class="tab-bar-container">
          <div class="tab-bar">
            <button id="tab-official" class="tab-btn active">OFFICIAL UPDATES</button>
            <button id="tab-news" class="tab-btn">LATEST AI NEWS</button>
          </div>
        </div>

        <!-- Official Updates View -->
        <div id="view-official" class="updates-list">
          <!-- Populated by JS -->
        </div>

        <!-- Latest AI News View -->
        <div id="view-news" class="updates-list hidden">
          <div id="news-loading">
            <p>Fetching latest exam news...</p>
          </div>
          <div id="news-content">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>
    </main>
    
    <script src="/nav.js"></script>
    <script type="module" src="./jkssb-updates.ts"></script>
    <script>
      lucide.createIcons();
    </script>
  </div>
</body>
</html>
